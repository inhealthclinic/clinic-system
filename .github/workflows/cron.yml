name: Cron jobs
on:
  schedule:
    - cron: '*/5 * * * *'   # bot greeting + bot followup + automation
    - cron: '*/15 * * * *'  # appointment reminders
    - cron: '0 6 * * *'     # daily tasks (birthdays, debts, controls)
  workflow_dispatch:

jobs:
  reminders:
    if: github.event.schedule == '*/15 * * * *' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - run: |
          curl -sSf -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
               "${{ secrets.REMINDER_URL }}" | tee r.json
          grep -q '"ok":true' r.json

  generate-tasks:
    if: github.event.schedule == '0 6 * * *' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - run: |
          curl -sSf -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
               "${{ secrets.GENERATE_TASKS_URL }}" | tee g.json
          grep -q '"ok":true' g.json

  bot-greeting:
    if: github.event.schedule == '*/5 * * * *' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - run: |
          curl -sSf -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
               "${{ secrets.BOT_GREETING_URL }}" | tee bg.json
          grep -q '"ok":true' bg.json

  bot-followup:
    if: github.event.schedule == '*/5 * * * *' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - run: |
          curl -sSf -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
               "${{ secrets.BOT_FOLLOWUP_URL }}" | tee bf.json
          grep -q '"ok":true' bf.json

  automation:
    if: github.event.schedule == '*/5 * * * *' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - run: |
          curl -sSf -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
               "${{ secrets.AUTOMATION_URL }}" | tee a.json
          grep -q '"ok":true' a.json
